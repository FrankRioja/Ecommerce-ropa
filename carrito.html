<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>

    <div class="contenedor">

        <aside>
            <header>
                <h1 class="logo"></h1>
            </header>

            <nav>
                <ul>
                    <li>
                        <a class="boton-menu boton-volver" href="./index.html">Seguir comprando</a>
                    </li>
                    <li>
                        <a class="boton-menu boton-carrito active" href="./carrito.html">Carrito</a>
                    </li>
                </ul>
            </nav>

        </aside>

        <main>
            <h2 class="titulo-principal">Carrito</h2>

            <div class="contenedor-carrito">
                <p id="carrito-vacio" class="carrito-vacio">Tu carrito esta vacio.</p>

                <div id="carrito-productos" class="carrito-productos disabled">
                    <!--Se rellena con js-->
                </div>

                <!-- ACCIONES (FUERA de los productos) -->
                <div id="carrito-acciones" class="carrito-acciones disabled">
                    <div class="carrito-acciones-izquierda">
                        <button class="carrito-acciones-vaciar">Vaciar carrito</button>
                    </div>

                    <div class="carrito-acciones-derecha">
                        <div class="carrito-acciones-total">
                            <p>Total</p>
                            <p id="total">:$36300</p>
                        </div>
                        <button class="carrito-acciones-comprar">Comprar</button>
                    </div>
                </div>


                <p id="carrito-comprado" class="carrito-comprado disabled">Muchas gracias por tu compra.</p>


            </div>
        </main>


    </div>


    <script src="./js/carrito.js"></script>
</body>

</html>
